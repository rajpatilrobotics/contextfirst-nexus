schema_version: "1.0.0"
project: contextfirst-nexus
graph_status: approved_for_implementation
task_count: 38

authority:
  repository_rules: AGENTS.md
  execution_plans: PLANS.md
  context_router: docs/CONTEXT_INDEX.md
  integration_rules: docs/ORCHESTRATION_AND_INTEGRATION.md
  shared_contracts: docs/CONTRACTS.md
  safety_policy: docs/SAFETY_AND_DATA.md

scheduler:
  strategy: rolling_ready_queue
  initial_active_worktree_limit: 3
  maximum_active_worktree_limit_after_readiness_check: 4
  ready_rule: all dependencies must be integrated into the coordinator branch
  launch_rule: create each worktree from the latest coordinator branch and give it exactly one task packet
  ownership_rule: no active tasks may own overlapping paths
  ownership_transfer_rule: a later task may receive a path only when it transitively depends on the earlier owner, both packets declare the transfer, and the two tasks are never active concurrently
  integration_rule: integrate one verified task at a time in dependency order
  stop_rule: do not launch implementation until the documentation package is approved and pushed
  allowed_statuses:
    - pending
    - ready
    - active
    - review
    - integrated
    - blocked

coordinator_owned_paths:
  - AGENTS.md
  - PLANS.md
  - TASK_GRAPH.yaml
  - decision-log.md
  - plan.md
  - PROJECT_BRIEF.md
  - docs/
  - tasks/

